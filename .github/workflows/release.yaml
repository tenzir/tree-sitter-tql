name: Release

on:
  workflow_dispatch:
    inputs:
      intro:
        description: "1-2 sentence release introduction"
        required: true
        type: string
      title:
        description: "User-facing release title"
        required: false
        default: ""
        type: string
      bump:
        description: "Version bump type"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      version:
        description: "Explicit stable release version, for example v1.2.3"
        required: false
        default: ""
        type: string
      rc:
        description: "Create or continue a release-candidate series"
        required: false
        default: false
        type: boolean

jobs:
  validate-release-config:
    name: Validate release workflow configuration
    runs-on: ubuntu-latest

    steps:
      - name: Validate release configuration
        env:
          RELEASE_RC: ${{ inputs.rc }}
          TENZIR_GITHUB_APP_ID: ${{ vars.TENZIR_GITHUB_APP_ID }}
          TENZIR_GITHUB_APP_PRIVATE_KEY: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          TENZIR_BOT_GPG_SIGNING_KEY: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}
        run: |
          if [ "$RELEASE_RC" = "true" ]; then
            echo "::error::Release candidates are not supported by the Tree-sitter publish workflow."
            exit 1
          fi

          if [ -z "$TENZIR_GITHUB_APP_ID" ]; then
            echo "::error::Repository variable 'TENZIR_GITHUB_APP_ID' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_GITHUB_APP_PRIVATE_KEY' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_BOT_GPG_SIGNING_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_BOT_GPG_SIGNING_KEY' must be set for release runs."
            exit 1
          fi

  release:
    needs: validate-release-config
    uses: tenzir/ship/.github/workflows/release.yaml@87509bbc44fc9dc383816ab5b0706584c21fbd64
    permissions:
      contents: write
    with:
      intro: ${{ inputs.intro }}
      title: ${{ inputs.title }}
      bump: ${{ inputs.bump }}
      version: ${{ inputs.version }}
      rc: ${{ inputs.rc }}
      skip-publish: true
      post-create: |
        set -euo pipefail

        release_version="$(uvx tenzir-ship release version)"
        node scripts/set-version.mjs "$release_version"
        npm run generate

        git add changelog
        git add -u
        git commit -m "Release $release_version"
        git tag -a "$release_version" -m "Release $release_version"
        git push origin "HEAD:$GITHUB_REF_NAME"
        git push origin "$release_version"
      github_app_id: ${{ vars.TENZIR_GITHUB_APP_ID }}
      git_user_name: tenzir-bot
      git_user_email: engineering@tenzir.com
      sign_commits: true
      sign_tags: true
    secrets:
      github_app_private_key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
      gpg_private_key: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}
